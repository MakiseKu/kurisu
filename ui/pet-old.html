<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kurisu · 桌宠</title>
    <style>
        * {
            /* 防止拖拽时误选文字 */
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;

            /*
             * ★ 背景设为透明
             *
             * 仅靠这一行 CSS 不够——还需要 electron-main.js 里
             * createPetWindow() 同时设置 transparent: true。
             * 两者缺一不可：
             *   · CSS transparent：告诉渲染引擎"不画背景色"
             *   · transparent:true：告诉 OS"不在窗口下方垫底色"
             * 只设 CSS：OS 仍然垫黑色，视觉还是黑的
             * 只设 JS：CSS 画了深色背景，挡住了 OS 的透明
             */
            background: transparent;
            color: #ede9fe;

            /*
             * ★ 拖拽区域声明
             *
             * transparent:true 之后，-webkit-app-region:drag
             * 在【有可见像素的区域】依然完全有效——
             * 拖 GIF 图片的任意位置 = 移动整个窗口，和有背景色时完全一样。
             *
             * 注意：GIF 四角的透明空白处，虽然视觉上透明，
             * 但窗口本体还在那里，鼠标点击仍被本窗口捕获（不穿透底层）。
             * 这对桌宠场景完全可以接受。
             *
             * 真正会破坏拖拽的是 setIgnoreMouseEvents(true,{forward:true})——
             * 它把鼠标事件转发给底层，Electron 的拖拽机制就接收不到了。
             * 本项目目前没有使用 setIgnoreMouseEvents，所以拖拽完全正常。
             */
            -webkit-app-region: drag;
        }

        /* 图片撑满窗口宽度，高度自适应 */
        #pet-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 状态切换按钮行 */
        #btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;

            /*
             * ★ 按钮行必须取消 drag
             * 否则按钮点击会被 Electron 拦截成"窗口拖拽"而完全失效
             */
            -webkit-app-region: no-drag;
        }

        .state-btn {
            background: rgba(45, 45, 45, 0.85);
            border: 1px solid rgba(85, 85, 85, 0.8);
            border-radius: 6px;
            color: #ede9fe;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            /*
             * 半透明磨砂效果：在透明背景上比实色更好看，
             * 既清晰可见，又不完全遮挡背景，保持轻盈感
             */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .state-btn:hover {
            background: rgba(58, 58, 58, 0.9);
        }

        /* 当前激活状态高亮 */
        .state-btn.active {
            background: rgba(91, 33, 182, 0.85);
            border-color: rgba(167, 139, 250, 0.8);
        }
    </style>
</head>
<body>

    <img id="pet-img" src="" alt="kurisu" />

    <div id="btn-row">
        <button class="state-btn" data-state="idle">idle</button>
        <button class="state-btn" data-state="talk">talk</button>
        <button class="state-btn" data-state="work">work</button>
        <button class="state-btn" data-state="celebrate">celebrate</button>
        <button class="state-btn" data-state="encourage">encourage</button>
        <button class="state-btn" data-state="pixel">pixel</button>
    </div>

    <script>
    // 素材路径映射
    // pet.html 在 ui/ 目录下，用 ../ 回到项目根，再进 assets/kurisu/
    var ASSETS = {
        idle:      '../assets/kurisu/idle.gif',
        talk:      '../assets/kurisu/talk.png',
        work:      '../assets/kurisu/work.gif',
        celebrate: '../assets/kurisu/celebrate.gif',
        encourage: '../assets/kurisu/encourage.gif',
        pixel:     '../assets/kurisu/pixel-idle.gif',
    }

    var petImg  = document.getElementById('pet-img')
    var buttons = document.querySelectorAll('.state-btn')

    // 切换到指定状态
    function setState(state) {
        var src = ASSETS[state]
        if (!src) return

        // GIF / APNG 强制从头播放：先清空 src，再重新赋值
        petImg.src = ''
        petImg.src = src

        // 更新按钮高亮
        buttons.forEach(function(btn) {
            if (btn.dataset.state === state) {
                btn.classList.add('active')
            } else {
                btn.classList.remove('active')
            }
        })
    }

    // 点击按钮手动切换
    buttons.forEach(function(btn) {
        btn.addEventListener('click', function() {
            setState(btn.dataset.state)
        })
    })

    // ── WebSocket：收到后端消息时自动切换状态 ──────────────────────────
    //
    // 和 learn.html 用同一个后端地址、同一套消息格式：
    //   后端 → 前端：
    //     { type: "context_update", process, title, reply }  窗口切换通知
    //     { type: "pet_state",      state }                  直接指定桌宠状态

    var WS_URL          = 'ws://127.0.0.1:8765/ws'
    var RECONNECT_DELAY = 2000

    var ws             = null
    var reconnectTimer = null

    function connect() {
        clearTimeout(reconnectTimer)

        ws = new WebSocket(WS_URL)

        ws.onopen = function() {
            console.log('[Pet WS] 已连接到后端')
        }

        ws.onmessage = function(event) {
            var data
            try { data = JSON.parse(event.data) }
            catch (e) { return }

            if (data.type === 'context_update') {
                // 根据当前活动进程名自动推断桌宠状态
                var proc = (data.process || '').toLowerCase()
                if (data.reply) {
                    // 后端带回复内容 → 说话状态
                    setState('talk')
                } else if (/code|cursor|vim|nvim|pycharm|idea/.test(proc)) {
                    setState('work')
                } else if (/chrome|firefox|edge|safari/.test(proc)) {
                    setState('work')
                } else {
                    setState('idle')
                }

            } else if (data.type === 'pet_state') {
                // 后端直接指定状态（如番茄钟结束 → celebrate）
                if (data.state) setState(data.state)
            }
        }

        ws.onclose = function() {
            console.log('[Pet WS] 连接断开，' + (RECONNECT_DELAY / 1000) + 's 后重连...')
            reconnectTimer = setTimeout(connect, RECONNECT_DELAY)
        }

        ws.onerror = function() {
            // onclose 会紧跟着触发，重连逻辑在那里处理
        }
    }

    // 默认显示 idle
    setState('idle')

    // 启动 WebSocket
    connect()
    </script>

</body>
</html>
