<body>

    <!-- 连接状态栏 -->
    <div id="status-bar">
        <div id="status-dot"></div>
        <span id="status-text">连接中...</span>
    </div>

    <!-- 红莉栖的主动评论（窗口切换触发） -->
    <div id="kurisu-text">等待系统连接...</div>

    <!-- 对话区域 -->
    <div id="chat-box">
        <div id="chat-history"></div>
        <div id="input-row">
            <input
                id="chat-input"
                type="text"
                placeholder="和红莉栖说点什么..."
                disabled
            />
            <button id="send-btn" disabled>发送</button>
        </div>
    </div>

    <script>
    // ══════════════════════════════════════════════════════════════════
    //  WebSocket 连接管理
    //
    //  和 SSE（EventSource）的区别：
    //    SSE  → 只能接收，前端无法主动发消息
    //    WS   → 双向，既能接收服务器推送，也能主动发消息给服务器
    //
    //  消息格式（JSON）：
    //    后端 → 前端：
    //      { type: "context_update", process, title, reply }  // 窗口切换通知
    //      { type: "chat_reply",     reply }                   // 对话回复
    //    前端 → 后端：
    //      { type: "chat",           text }                    // 用户发消息
    // ══════════════════════════════════════════════════════════════════

    const WS_URL          = 'ws://127.0.0.1:8765/ws'
    const RECONNECT_DELAY = 2000   // 断线后 2 秒重连

    let ws              = null
    let reconnectTimer  = null
    let isConnected     = false

    // ── DOM 引用 ──────────────────────────────────────────────────────
    const dot         = document.getElementById('status-dot')
    const statusText  = document.getElementById('status-text')
    const kurisuText  = document.getElementById('kurisu-text')
    const chatHistory = document.getElementById('chat-history')
    const chatInput   = document.getElementById('chat-input')
    const sendBtn     = document.getElementById('send-btn')

    // ── 状态 UI 工具 ──────────────────────────────────────────────────
    function setStatus(state) {
        dot.className = state
        const labels = {
            connected:    '已连接',
            reconnecting: '重连中...',
            '':           '未连接',
        }
        statusText.textContent = labels[state] ?? '未知'
    }

    function setInputEnabled(enabled) {
        chatInput.disabled = !enabled
        sendBtn.disabled   = !enabled
    }

    // ── 聊天历史追加 ──────────────────────────────────────────────────
    function appendMsg(who, text) {
        // who: 'user' | 'kurisu'
        const div = document.createElement('div')
        div.className = `msg-${who}`
        div.textContent = who === 'user' ? `你：${text}` : `红莉栖：${text}`
        chatHistory.appendChild(div)
        chatHistory.scrollTop = chatHistory.scrollHeight
    }

    // ── WebSocket 核心 ────────────────────────────────────────────────
    function connect() {
        clearTimeout(reconnectTimer)
        setStatus('reconnecting')
        setInputEnabled(false)

        ws = new WebSocket(WS_URL)

        // 连接成功
        ws.onopen = function() {
            isConnected = true
            setStatus('connected')
            setInputEnabled(true)
            console.log('[WS] 已连接到后端')
        }

        // 收到后端消息
        ws.onmessage = function(event) {
            let data
            try { data = JSON.parse(event.data) }
            catch { return }

            if (data.type === 'context_update') {
                // 窗口切换通知 → 显示在主评论区
                if (data.reply) kurisuText.textContent = data.reply

            } else if (data.type === 'chat_reply') {
                // 对话回复 → 显示在聊天历史
                if (data.reply) appendMsg('kurisu', data.reply)
            }
        }

        // 连接关闭（正常或异常）→ 自动重连
        ws.onclose = function() {
            isConnected = false
            setStatus('reconnecting')
            setInputEnabled(false)
            console.log(`[WS] 连接断开，${RECONNECT_DELAY / 1000}s 后重连...`)
            reconnectTimer = setTimeout(connect, RECONNECT_DELAY)
        }

        ws.onerror = function(err) {
            console.warn('[WS] 连接出错：', err)
            // onclose 会紧跟着触发，重连逻辑在那里处理
        }
    }

    // ── 发送消息 ──────────────────────────────────────────────────────
    function sendMessage() {
        const text = chatInput.value.trim()
        if (!text || !isConnected) return

        // 1. 显示在聊天历史
        appendMsg('user', text)

        // 2. 发给后端
        ws.send(JSON.stringify({ type: 'chat', text }))

        // 3. 清空输入框
        chatInput.value = ''
    }

    // 点击发送按钮
    sendBtn.addEventListener('click', sendMessage)

    // 按 Enter 发送（Shift+Enter 换行）
    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault()
            sendMessage()
        }
    })

    // ── 启动连接 ──────────────────────────────────────────────────────
    connect()
    </script>
